id: "PDS"
name: "Postpartum Depression Screening"
version: "2025"
domain: "maternity"
description: >
  Assesses whether women aged 15-44 who had a delivery during the measurement
  year received screening for postpartum depression within three months
  following delivery using a standardized screening tool. Postpartum depression
  affects approximately 10-15% of women after childbirth and can impair
  maternal-infant bonding, infant development, and maternal functioning.
  Timely postpartum depression screening within the first three months after
  delivery is critical for early identification and treatment initiation.

eligibility:
  age: {min: 15, max: 44, as_of: "12-31"}
  gender: ["female"]
  continuous_enrollment: true

denominator:
  requires_diagnosis:
    valueset: "VS_DELIVERY_CPT"
    lookback_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "procedure"
      valueset: "VS_DEPRESSION_SCREENING_CPT"
      window_months: 3

valuesets_needed:
  - VS_DELIVERY_CPT
  - VS_DEPRESSION_SCREENING_CPT
  - VS_HOSPICE

data_sources:
  - "claims"
  - "encounters"
