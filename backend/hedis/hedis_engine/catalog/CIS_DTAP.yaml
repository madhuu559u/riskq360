id: "CIS-DTAP"
name: "Childhood Immunization Status - DTaP"
version: "2025"
domain: "immunization"
description: >
  Assesses whether children who turned 2 years old during the measurement
  year received at least four doses of the diphtheria, tetanus, and acellular
  pertussis (DTaP) vaccine by their second birthday. DTaP vaccination protects
  against three serious bacterial diseases and is a core component of the
  childhood immunization schedule.

eligibility:
  age: {min: 2, max: 2, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  age_only: true

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"
  - type: "diagnosis"
    valueset: "VS_IMMUNIZATION_CONTRAINDICATION"
    lookback_months: 24
    description: "Contraindication to vaccine"

numerator:
  all_of:
    - type: "immunization"
      vaccine_type: "dtap"
      min_count: 4
      window_months: 24

valuesets_needed:
  - VS_DTAP_VACCINE
  - VS_HOSPICE
  - VS_IMMUNIZATION_CONTRAINDICATION

data_sources:
  - "claims"
  - "immunization_registry"
