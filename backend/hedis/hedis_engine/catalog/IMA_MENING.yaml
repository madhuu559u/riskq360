id: "IMA-MENING"
name: "Immunizations for Adolescents - Meningococcal"
version: "2025"
domain: "immunization"
description: >
  Assesses whether adolescents who turned 13 years old during the measurement
  year received at least one dose of the meningococcal conjugate (MenACWY)
  vaccine by their 13th birthday. Meningococcal disease can cause bacterial
  meningitis and septicemia with high mortality and morbidity rates.
  Adolescents and young adults are at elevated risk due to living in
  close-contact settings.

eligibility:
  age: {min: 13, max: 13, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  age_only: true

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"
  - type: "diagnosis"
    valueset: "VS_IMMUNIZATION_CONTRAINDICATION"
    lookback_months: 24
    description: "Contraindication to vaccine"

numerator:
  all_of:
    - type: "immunization"
      vaccine_type: "meningococcal"
      min_count: 1
      window_months: 156

valuesets_needed:
  - VS_MENINGOCOCCAL_VACCINE
  - VS_HOSPICE
  - VS_IMMUNIZATION_CONTRAINDICATION

data_sources:
  - "claims"
  - "immunization_registry"
