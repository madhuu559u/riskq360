id: "PRS-FLU"
name: "Prenatal Immunization Status - Influenza"
version: "2025"
domain: "maternity"
description: >
  Assesses whether women aged 15-44 who had a live birth during the
  measurement year received an influenza vaccine during pregnancy or
  during the flu season in the year of delivery. Influenza infection
  during pregnancy is associated with increased risk of hospitalization,
  preterm birth, and adverse fetal outcomes. Maternal influenza vaccination
  provides passive immunity to the newborn during the first months of
  life when the infant is too young to be vaccinated. CDC and ACOG
  recommend influenza vaccination for all pregnant women during any
  trimester of pregnancy.

eligibility:
  age: {min: 15, max: 44, as_of: "12-31"}
  gender: ["female"]
  continuous_enrollment: true

denominator:
  requires_procedure:
    valueset: "VS_DELIVERY_CPT"
    window_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "immunization"
      vaccine_type: "influenza"
      valueset: "VS_FLU_VACCINE_CVX"
      min_count: 1
      window_months: 12
      description: "Influenza immunization during pregnancy period"

valuesets_needed:
  - VS_DELIVERY_CPT
  - VS_FLU_VACCINE_CVX
  - VS_HOSPICE

data_sources:
  - "claims"
  - "immunization_registry"
  - "encounters"
