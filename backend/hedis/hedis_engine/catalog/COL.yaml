id: "COL"
name: "Colorectal Cancer Screening"
version: "2025"
domain: "preventive_screening"
description: >
  Assesses whether adults aged 45-75 received appropriate screening for
  colorectal cancer. Acceptable screening modalities include colonoscopy
  (every 10 years), flexible sigmoidoscopy (every 5 years), or fecal
  immunochemical test / FIT-DNA (annually). Colorectal cancer is the
  third most common cancer and the second leading cause of cancer death
  in the United States. Screening enables early detection and removal
  of precancerous polyps.

eligibility:
  age: {min: 45, max: 75, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: true

denominator:
  age_only: true

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"
  - type: "diagnosis"
    valueset: "VS_COLORECTAL_CANCER_ICD10"
    lookback_months: 0
    description: "History of colorectal cancer (any time)"

numerator:
  any_of:
    - type: "procedure"
      valueset: "VS_COLONOSCOPY_CPT"
      lookback_years: 10
    - type: "procedure"
      valueset: "VS_FIT_TEST_CPT"
      window_months: 12
    - type: "procedure"
      valueset: "VS_SIGMOIDOSCOPY_CPT"
      lookback_years: 5

valuesets_needed:
  - VS_COLONOSCOPY_CPT
  - VS_FIT_TEST_CPT
  - VS_SIGMOIDOSCOPY_CPT
  - VS_HOSPICE
  - VS_COLORECTAL_CANCER_ICD10

data_sources:
  - "claims"
  - "encounters"
