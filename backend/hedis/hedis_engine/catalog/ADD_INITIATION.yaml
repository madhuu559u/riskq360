id: "ADD-INITIATION"
name: "Follow-Up Care for Children Prescribed ADHD Medication - Initiation"
version: "2025"
domain: "behavioral_health"
description: >
  Assesses whether children aged 6-12 who were newly prescribed ADHD
  medication had a follow-up visit with a practitioner within 30 days of
  starting the medication (initiation phase). Early follow-up after
  starting ADHD medication is essential for evaluating treatment
  response, monitoring for side effects, and adjusting dosage. The
  actual HEDIS specification requires a new ADHD prescription as the
  qualifying event; this implementation is simplified to use an
  outpatient encounter as a denominator proxy.

eligibility:
  age: {min: 6, max: 12, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  requires_encounter:
    encounter_types: ["outpatient"]
    window_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"
  - type: "diagnosis"
    valueset: "VS_NARCOLEPSY_ICD10"
    lookback_months: 12
    description: "Narcolepsy diagnosis"

numerator:
  all_of:
    - type: "encounter"
      encounter_types: ["outpatient"]
      window_months: 12
      description: "Follow-up visit within 30 days of ADHD medication start"

valuesets_needed:
  - VS_ADHD_MEDICATIONS
  - VS_ADHD_ICD10
  - VS_NARCOLEPSY_ICD10
  - VS_HOSPICE

data_sources:
  - "claims"
  - "encounters"
  - "pharmacy"
