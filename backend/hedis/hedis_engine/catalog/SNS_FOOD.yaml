id: "SNS-FOOD"
name: "Social Need Screening - Food Insecurity"
version: "2025"
domain: "social_determinants"
description: >
  Assesses whether adults aged 18 and older who had an outpatient encounter
  during the measurement year were screened for food insecurity using a
  standardized social needs screening tool (e.g., PRAPARE, Accountable Health
  Communities, HRSN). Food insecurity affects approximately 10% of US
  households and is associated with poorer health outcomes, increased chronic
  disease prevalence, and higher healthcare utilization. Screening for food
  insecurity in clinical settings enables identification and referral to
  community resources such as food assistance programs, food banks, and
  nutrition support services.

eligibility:
  age: {min: 18, max: 150, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: true

denominator:
  age_only: true
  requires_encounter:
    type: "outpatient"
    window_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "procedure"
      valueset: "VS_SOCIAL_NEEDS_SCREENING_CPT"
      window_months: 12

valuesets_needed:
  - VS_SOCIAL_NEEDS_SCREENING_CPT
  - VS_HOSPICE

data_sources:
  - "claims"
  - "encounters"
