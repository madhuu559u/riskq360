id: "CIS-HIB"
name: "Childhood Immunization Status - Hib"
version: "2025"
domain: "immunization"
description: >
  Assesses whether children who turned 2 years old during the measurement
  year received at least three doses of the Haemophilus influenzae type b
  (Hib) conjugate vaccine by their second birthday. Hib vaccination prevents
  invasive Hib disease including meningitis, pneumonia, and epiglottitis,
  which disproportionately affect young children.

eligibility:
  age: {min: 2, max: 2, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  age_only: true

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"
  - type: "diagnosis"
    valueset: "VS_IMMUNIZATION_CONTRAINDICATION"
    lookback_months: 24
    description: "Contraindication to vaccine"

numerator:
  all_of:
    - type: "immunization"
      vaccine_type: "hib"
      min_count: 3
      window_months: 24

valuesets_needed:
  - VS_HIB_VACCINE
  - VS_HOSPICE
  - VS_IMMUNIZATION_CONTRAINDICATION

data_sources:
  - "claims"
  - "immunization_registry"
