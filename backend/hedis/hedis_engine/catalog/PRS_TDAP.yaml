id: "PRS-TDAP"
name: "Prenatal Immunization Status - Tdap"
version: "2025"
domain: "maternity"
description: >
  Assesses whether women aged 15-44 who had a live birth during the
  measurement year received a tetanus, diphtheria, and acellular
  pertussis (Tdap) vaccine during pregnancy. ACOG and CDC recommend
  Tdap vaccination during each pregnancy, optimally between 27 and 36
  weeks of gestation, to maximize maternal antibody response and passive
  transfer of pertussis antibodies to the newborn. Pertussis (whooping
  cough) is particularly dangerous for infants under 2 months of age
  who are too young to receive their own DTaP vaccination, and maternal
  Tdap vaccination provides critical protection during this vulnerable
  window.

eligibility:
  age: {min: 15, max: 44, as_of: "12-31"}
  gender: ["female"]
  continuous_enrollment: true

denominator:
  requires_procedure:
    valueset: "VS_DELIVERY_CPT"
    window_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "immunization"
      vaccine_type: "tdap"
      valueset: "VS_TD_VACCINE_CVX"
      min_count: 1
      window_months: 12
      description: "Tdap immunization during pregnancy period"

valuesets_needed:
  - VS_DELIVERY_CPT
  - VS_TD_VACCINE_CVX
  - VS_HOSPICE

data_sources:
  - "claims"
  - "immunization_registry"
  - "encounters"
