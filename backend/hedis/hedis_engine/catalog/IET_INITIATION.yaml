id: "IET-INITIATION"
name: "Initiation of Substance Use Disorder Treatment"
version: "2025"
domain: "behavioral_health"
description: >
  Assesses whether members aged 13 and older with a new episode of
  substance use disorder (SUD) initiated treatment within 14 days of
  diagnosis. The initiation phase is defined as receiving at least one
  SUD treatment service (including outpatient visits, intensive outpatient,
  partial hospitalization, medication-assisted treatment, or telehealth)
  shortly after a new SUD diagnosis. Early initiation of treatment is
  associated with better outcomes, including higher rates of sustained
  recovery and reduced risk of overdose, relapse, and emergency
  utilization. This measure uses a 12-month procedure search window as
  an approximation.

eligibility:
  age: {min: 13, max: 150, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  requires_diagnosis:
    valueset: "VS_SUBSTANCE_USE_ICD10"
    lookback_months: 12
    status: ["active"]

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  any_of:
    - type: "procedure"
      valueset: "VS_SUD_TREATMENT_CPT"
      window_months: 12
      description: "SUD treatment service initiated after new SUD diagnosis"

valuesets_needed:
  - VS_SUBSTANCE_USE_ICD10
  - VS_SUD_TREATMENT_CPT
  - VS_HOSPICE

data_sources:
  - "claims"
  - "encounters"
