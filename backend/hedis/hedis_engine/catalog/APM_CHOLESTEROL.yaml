id: "APM-CHOLESTEROL"
name: "Metabolic Monitoring - Cholesterol Testing"
version: "2025"
domain: "behavioral_health"
description: >
  Assesses whether children and adolescents aged 1-17 on antipsychotic
  medications had LDL cholesterol or total cholesterol testing during
  the measurement year. Antipsychotic medications are associated with
  dyslipidemia as a metabolic side effect. Regular lipid monitoring
  enables early detection and management of cardiovascular risk factors.
  The actual HEDIS specification requires two or more antipsychotic
  prescription fills; this implementation is simplified to check for an
  outpatient encounter as a denominator proxy combined with cholesterol
  lab monitoring.

eligibility:
  age: {min: 1, max: 17, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  requires_encounter:
    encounter_types: ["outpatient"]
    window_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  any_of:
    - type: "lab_exists"
      lab: "LDL"
      window_months: 12
      description: "LDL cholesterol test during measurement year"
    - type: "lab_exists"
      lab: "CHOLESTEROL"
      window_months: 12
      description: "Total cholesterol test during measurement year"

valuesets_needed:
  - VS_ANTIPSYCHOTIC_MEDICATIONS
  - VS_LDL_TEST_CPT
  - VS_CHOLESTEROL_TEST_CPT
  - VS_HOSPICE

data_sources:
  - "claims"
  - "labs"
  - "pharmacy"
