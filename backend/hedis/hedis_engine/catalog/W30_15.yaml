id: "W30-15"
name: "Well-Child Visits in First 15 Months of Life"
version: "2025"
domain: "pediatric"
description: >
  Assesses whether children in their first 15 months of life received
  well-child visits with a primary care provider. The American Academy of
  Pediatrics recommends six well-child visits during the first 15 months.
  These visits are critical for monitoring growth and development,
  administering immunizations, and providing anticipatory guidance to
  parents and caregivers. This measure checks for at least one documented
  well-child encounter (6 required per spec, simplified to encounter check).

eligibility:
  age: {min: 1, max: 1, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: false

denominator:
  age_only: true

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "encounter"
      encounter_types: ["outpatient"]
      window_months: 15
      description: "At least one well-child visit documented (6 required per spec, simplified to encounter check)"

valuesets_needed:
  - VS_WELL_CHILD_CPT
  - VS_HOSPICE

data_sources:
  - "claims"
  - "encounters"
