id: "PPC-POSTPARTUM"
name: "Prenatal and Postpartum Care - Postpartum Care"
version: "2025"
domain: "maternity"
description: >
  Assesses whether women aged 15-44 who had a delivery received a postpartum
  care visit during the measurement year. Postpartum care is critical for
  monitoring maternal recovery, screening for postpartum depression, managing
  chronic conditions exacerbated by pregnancy (e.g., gestational diabetes,
  preeclampsia), providing contraceptive counseling, and supporting
  breastfeeding. The denominator is identified by evidence of a delivery
  event during the measurement year.

eligibility:
  age: {min: 15, max: 44, as_of: "12-31"}
  gender: ["female"]
  continuous_enrollment: true

denominator:
  requires_diagnosis:
    valueset: "VS_DELIVERY_CPT"
    lookback_months: 12

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "procedure"
      valueset: "VS_POSTPARTUM_VISIT_CPT"
      window_months: 12

valuesets_needed:
  - VS_DELIVERY_CPT
  - VS_POSTPARTUM_VISIT_CPT
  - VS_HOSPICE

data_sources:
  - "claims"
  - "encounters"
