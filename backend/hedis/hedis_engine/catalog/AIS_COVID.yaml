id: "AIS-COVID"
name: "Adult Immunization Status - COVID-19"
version: "2025"
domain: "immunization"
description: >
  Assesses whether adults aged 65 and older received a COVID-19 vaccination
  during the measurement year. The Advisory Committee on Immunization Practices
  (ACIP) recommends updated COVID-19 vaccination for adults, with particular
  emphasis on older adults who are at highest risk for severe illness,
  hospitalization, and death from COVID-19. This measure evaluates receipt of
  at least one COVID-19 vaccine dose (updated formulation) within the
  measurement year.

eligibility:
  age: {min: 65, max: 120, as_of: "12-31"}
  gender: ["male", "female"]
  continuous_enrollment: true

denominator:
  age_only: true

exclusions:
  - type: "diagnosis"
    valueset: "VS_HOSPICE"
    lookback_months: 12
    description: "Hospice care"

numerator:
  all_of:
    - type: "immunization"
      vaccine_type: "covid"
      valueset: "VS_COVID_VACCINE_CVX"
      min_count: 1
      window_months: 12

valuesets_needed:
  - VS_COVID_VACCINE_CVX
  - VS_HOSPICE

data_sources:
  - "claims"
  - "immunization_registry"
  - "encounters"
