services:
  # ─── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: riskq360-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medinsight360}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - riskq360_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-medinsight360}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── FastAPI Backend ───────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riskq360-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_BACKEND: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-medinsight360}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      API_PORT: 8000
    ports:
      - "8006:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/run_outputs:/app/run_outputs
      - ./backend/input:/app/input
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── React/Mantine Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: riskq360-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3008:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  riskq360_pgdata:
    driver: local
